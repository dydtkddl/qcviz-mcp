name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Full test suite (Linux only: PySCF requires POSIX) ──────────────
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install ALL dependencies (including PySCF)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src tests

      - name: Test with pytest (full suite)
        run: |
          pytest --cov=src/qcviz_mcp tests/ --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Partial test suite (Windows/macOS: no PySCF) ────────────────────
  test-non-linux:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies (WITHOUT PySCF)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev-no-pyscf]"

      - name: Lint with ruff
        run: |
          ruff check src tests

      - name: Test with pytest (PySCF tests auto-skipped)
        run: |
          pytest --cov=src/qcviz_mcp tests/ --cov-report=xml -k "not pyscf"
